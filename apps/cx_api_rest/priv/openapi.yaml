        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/agent/offers/{offer_id}/accept:
    parameters:
      - name: offer_id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Agent]
      operationId: acceptOffer
      summary: Accept an offer (idempotent).
