      - $ref: "#/components/parameters/TenantOverride"
    delete:
      tags: [Agent]
      operationId: forceStopAgentSession
      summary: Force-sign-out another agent.
      description: >-
        Requeues engaged work, finalizes ACW, overrides mandatory codes.
