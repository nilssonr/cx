      security:
        - bearerAuth: [presence:set:self]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PresenceUpdate" }
      responses:
        "200":
          description: Your updated presence.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OwnPresence" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Validation" }

  /api/v1/presence/directory:
    get:
      tags: [Presence]
      operationId: presenceDirectory
      summary: Presence of every active tenant member.
      description: Any authenticated tenant member.
      responses:
        "200":
          description: Directory entries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DirectoryEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OIDC access token validated against the configured JWKS. The token's
        subject resolves to an active user in the tenant; permissions come from
        the user's roles. An operation's security value names the permission
        that user's roles must include (enforced server-side, not carried in
        the token); an empty list means any authenticated caller.

  parameters:
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema: { type: string }
    Id:
      name: id
      in: path
      required: true
      schema: { type: string }
    InteractionId:
      name: interaction_id
      in: path
      required: true
      schema: { type: string }
    TenantOverride:
      name: X-Tenant-Id
      in: header
      required: false
      description: >-
        Platform admins (holding `tenants:admin`) target another tenant by its
        id. Omit to act on your own tenant (from the token). A non-admin naming
        a tenant other than their own gets 403.
      schema: { type: string }

  responses:
    NoContent:
      description: Success, no body.
    Unauthorized:
      description: Missing or invalid Bearer token.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Forbidden:
      description: Authenticated but not permitted.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    NotFound:
      description: Resource does not exist (or is not visible to you).
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Conflict:
      description: The request conflicts with current state.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Validation:
      description: The request body or parameters failed validation.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Problem:
      type: object
      description: RFC 9457 Problem Details.
      properties:
        type:
          type: string
          description: Stable error identifier, e.g. `urn:cx:error:in_use`.
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        errors:
          type: array
          description: Present for validation failures.
          items:
            type: object
            properties:
              field: { type: string }
            required: [field]
      required: [type, title, status]

    MediaType:
      type: string
      enum: [voice, chat, sms, email, open_media, social_media]

    PresenceState:
      type: string
      enum: [online, away, busy, dnd, offline, out_of_office]

    InteractionState:
      type: string
      enum: [queued, offered, active, held, wrapup, completed, cancelled]

    Timestamp:
      type: integer
      description: Milliseconds since the Unix epoch.

    Tenant:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string, enum: [active, suspended] }
        created_at: { $ref: "#/components/schemas/Timestamp" }
        updated_at: { $ref: "#/components/schemas/Timestamp" }
      required: [id, name, status, created_at, updated_at]
    TenantCreate:
      type: object
      properties:
        name: { type: string }
        id:
          type: string
          description: Optional IdP org id; generated when omitted.
      required: [name]
    TenantUpdate:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [active, suspended] }

    UserSkill:
      type: object
      properties:
        skill_id: { type: string }
        rank: { type: integer, minimum: 1 }
      required: [skill_id, rank]
    User:
      type: object
      properties:
        id: { type: string }
        subject: { type: [string, "null"] }
        name: { type: string }
        email: { type: string }
        role_ids:
          type: array
          items: { type: string }
        skills:
          type: array
          items: { $ref: "#/components/schemas/UserSkill" }
        routing_profile_id: { type: [string, "null"] }
        status: { type: string, enum: [active, disabled] }
        created_at: { $ref: "#/components/schemas/Timestamp" }
        updated_at: { $ref: "#/components/schemas/Timestamp" }
      required:
        [id, name, email, role_ids, skills, status, created_at, updated_at]
    UserCreate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        subject: { type: string }
        role_ids:
          type: array
          items: { type: string }
        skills:
          type: array
          items: { $ref: "#/components/schemas/UserSkill" }
        routing_profile_id: { type: string }
      required: [name, email]
    UserUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        subject: { type: string }
        role_ids:
          type: array
          items: { type: string }
        skills:
          type: array
          items: { $ref: "#/components/schemas/UserSkill" }
        routing_profile_id: { type: string }
        status: { type: string, enum: [active, disabled] }

    Role:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        permissions:
          type: array
          items: { type: string }
      required: [id, name, permissions]
    RoleCreate:
      type: object
      properties:
        name: { type: string }
        permissions:
          type: array
          description: Tenant-assignable permission strings only.
          items: { type: string }
      required: [name]
    RoleUpdate:
      type: object
      properties:
        name: { type: string }
        permissions:
          type: array
          items: { type: string }

    SkillLevel:
      type: object
      properties:
        rank: { type: integer, minimum: 1 }
        name: { type: string }
      required: [rank, name]
    Skill:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        levels:
          type: array
          items: { $ref: "#/components/schemas/SkillLevel" }
      required: [id, name, levels]
    SkillCreate:
      type: object
      properties:
        name: { type: string }
        levels:
          type: array
          items: { $ref: "#/components/schemas/SkillLevel" }
      required: [name]
    SkillUpdate:
      type: object
      properties:
        name: { type: string }
        levels:
          type: array
          items: { $ref: "#/components/schemas/SkillLevel" }

    Widening:
      type: object
      properties:
        after_ms: { type: integer, minimum: 1 }
        min_rank: { type: integer, minimum: 1 }
      required: [after_ms, min_rank]
    SkillRequirement:
      type: object
      properties:
        skill_id: { type: string }
        min_rank: { type: integer, minimum: 1 }
        widening:
          type: array
          items: { $ref: "#/components/schemas/Widening" }
      required: [skill_id, min_rank, widening]
    Queue:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        skill_requirements:
          type: array
          items: { $ref: "#/components/schemas/SkillRequirement" }
        wrapup_duration_ms: { type: integer, minimum: 0 }
        wrapup_max_ms:
          type: integer
          description: 0 means uncapped.
        offer_timeout_ms:
          type: integer
          description: 0 means ring forever.
        qualification_required: { type: boolean }
        status: { type: string, enum: [open, closed] }
      required:
        - id
        - name
        - skill_requirements
        - wrapup_duration_ms
        - wrapup_max_ms
        - offer_timeout_ms
        - qualification_required
        - status
    QueueCreate:
      type: object
      properties:
        name: { type: string }
        skill_requirements:
          type: array
          items: { $ref: "#/components/schemas/SkillRequirement" }
        wrapup_duration_ms: { type: integer, minimum: 0, default: 30000 }
        wrapup_max_ms:
          type: integer
          description: 0 = uncapped (the default).
        offer_timeout_ms:
          type: integer
          description: 0 = ring forever. Default 6000.
        qualification_required: { type: boolean, default: false }
        status: { type: string, enum: [open, closed], default: open }
      required: [name]
    QueueUpdate:
      type: object
      properties:
        name: { type: string }
        skill_requirements:
          type: array
          items: { $ref: "#/components/schemas/SkillRequirement" }
        wrapup_duration_ms: { type: integer, minimum: 0 }
        wrapup_max_ms: { type: integer }
        offer_timeout_ms: { type: integer }
        qualification_required: { type: boolean }
        status: { type: string, enum: [open, closed] }

    Guard:
      type: object
      properties:
        when_media: { $ref: "#/components/schemas/MediaType" }
        at_least: { type: integer, minimum: 1 }
        block:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/MediaType" }
      required: [when_media, at_least, block]
    RoutingProfile:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        max_total:
          type: [integer, "null"]
          description: null means unlimited.
        media_capacities:
          type: object
          additionalProperties: { type: integer, minimum: 0 }
        guards:
          type: array
          items: { $ref: "#/components/schemas/Guard" }
      required: [id, name, max_total, media_capacities, guards]
    RoutingProfileCreate:
      type: object
      properties:
        name: { type: string }
        max_total:
          type: [integer, "null"]
          minimum: 1
        media_capacities:
          type: object
          additionalProperties: { type: integer, minimum: 0 }
        guards:
          type: array
          items: { $ref: "#/components/schemas/Guard" }
      required: [name]
    RoutingProfileUpdate:
      type: object
      properties:
        name: { type: string }
        max_total:
          type: [integer, "null"]
          minimum: 1
        media_capacities:
          type: object
          additionalProperties: { type: integer, minimum: 0 }
        guards:
          type: array
          items: { $ref: "#/components/schemas/Guard" }

    NotReadyReason:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        active: { type: boolean }
      required: [id, name, active]
    NotReadyReasonCreate:
      type: object
      properties:
        name: { type: string }
      required: [name]
    NotReadyReasonUpdate:
      type: object
      properties:
        name: { type: string }
        active: { type: boolean }

    QualificationCode:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        parent_id: { type: [string, "null"] }
        active: { type: boolean }
      required: [id, name, parent_id, active]
    QualificationCodeCreate:
      type: object
      properties:
        name: { type: string }
        parent_id:
          type: [string, "null"]
          description: null (or absent) is a root code.
      required: [name]
    QualificationCodeUpdate:
      type: object
      properties:
        name: { type: string }
        parent_id: { type: [string, "null"] }
        active: { type: boolean }

    ReadyState:
      type: object
      description: Readiness for one media channel.
      properties:
        state: { type: string, enum: [ready, not_ready] }
        reason_id:
          type: [string, "null"]
          description: Required for `not_ready`; must be null/absent for `ready`.
      required: [state]
    AgentSession:
      type: object
      properties:
        agent_id: { type: string }
        ready:
          type: object
          description: Per-media readiness, keyed by media type.
          additionalProperties: { $ref: "#/components/schemas/ReadyState" }
        active:
          type: array
          items: { type: string }
        held:
          type: array
          items: { type: string }
        wrapup:
          type: array
          items: { type: string }
        pending_offers:
          type: array
          items: { $ref: "#/components/schemas/Offer" }
      required: [agent_id, ready, active, held, wrapup, pending_offers]

    Offer:
      type: object
      properties:
        offer_id: { type: string }
        interaction_id: { type: string }
        media_type: { $ref: "#/components/schemas/MediaType" }
        queue_id: { type: string }
        expires_at:
          type: [integer, "null"]
          description: Epoch ms, or null to ring forever.
      required: [offer_id, interaction_id, media_type, queue_id, expires_at]

    Interaction:
      type: object
      properties:
        id: { type: string }
        queue_id: { type: string }
        media_type: { $ref: "#/components/schemas/MediaType" }
        properties:
          type: object
          additionalProperties: { type: string }
        state: { $ref: "#/components/schemas/InteractionState" }
        agent_id: { type: [string, "null"] }
        created_at: { $ref: "#/components/schemas/Timestamp" }
        enqueued_at: { $ref: "#/components/schemas/Timestamp" }
        accepted_at: { type: [integer, "null"] }
        wrapup_started_at: { type: [integer, "null"] }
        wrapup_until: { type: [integer, "null"] }
        qualification_ids:
          type: array
          items: { type: string }
        completed_at: { type: [integer, "null"] }
      required:
        - id
        - queue_id
        - media_type
        - properties
        - state
        - agent_id
        - created_at
        - enqueued_at
        - qualification_ids
    InteractionCreate:
      type: object
      properties:
        queue_id: { type: string }
        media_type: { $ref: "#/components/schemas/MediaType" }
        properties:
          type: object
          additionalProperties: { type: string }
      required: [queue_id, media_type]

    WrapupState:
      type: object
      properties:
        state: { type: string, const: wrapup }
        wrapup_until: { $ref: "#/components/schemas/Timestamp" }
      required: [state, wrapup_until]

    OwnPresence:
      type: object
      properties:
        state: { $ref: "#/components/schemas/PresenceState" }
        manual_state:
          oneOf:
            - { $ref: "#/components/schemas/PresenceState" }
            - { type: "null" }
        message: { type: [string, "null"] }
        until: { type: [integer, "null"] }
        device_count: { type: integer, minimum: 0 }
        updated_at: { type: [integer, "null"] }
      required: [state, manual_state, message, until, device_count, updated_at]
    PresenceUpdate:
      type: object
      properties:
        state:
          description: A declared state, or `automatic`/null to clear to automatic.
          oneOf:
            - { $ref: "#/components/schemas/PresenceState" }
            - { type: string, const: automatic }
            - { type: "null" }
        message: { type: string }
        until:
          type: integer
          description: Epoch ms in the future; requires `state` or `message`.
    DirectoryEntry:
      type: object
      properties:
        user_id: { type: string }
        name: { type: string }
        state: { $ref: "#/components/schemas/PresenceState" }
        message: { type: [string, "null"] }
        until: { type: [integer, "null"] }
      required: [user_id, name, state, message, until]
