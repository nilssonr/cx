        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/interactions:
    post:
      tags: [Interactions]
      operationId: createInteraction
      summary: Enqueue an interaction.
      security:
        - bearerAuth: [interactions:create]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InteractionCreate" }
      responses:
        "200":
          description: The created interaction id.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
