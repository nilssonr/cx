        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }
    get:
      tags: [Interactions]
      operationId: listInteractions
      summary: List interactions (cursor-paginated).
      security:
        - bearerAuth: [interactions:read]
      parameters:
        - name: queue_id
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema: { $ref: "#/components/schemas/InteractionState" }
        - name: media_type
          in: query
          schema: { $ref: "#/components/schemas/MediaType" }
        - name: agent_id
          in: query
          schema: { type: string }
        - name: limit
          in: query
          description: 1..200, default 50.
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: after
          in: query
          description: Cursor — an interaction id from a prior page's `next`.
          schema: { type: string }
      responses:
        "200":
          description: A page of interactions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Interaction" }
                  next:
                    type: [string, "null"]
                    description: Cursor for the next page, or null when exhausted.
                required: [items, next]
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Validation" }

  /api/v1/interactions/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Interactions]
      operationId: getInteraction
      summary: Fetch an interaction.
      security:
        - bearerAuth: [interactions:read]
      responses:
        "200":
          description: The interaction.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Interaction" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/interactions/{id}/cancel:
