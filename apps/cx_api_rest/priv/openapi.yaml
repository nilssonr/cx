    post:
      tags: [Interactions]
      operationId: cancelInteraction
      summary: Cancel a queued interaction.
      security:
        - bearerAuth: [interactions:cancel]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/presence:
    get:
      tags: [Presence]
      operationId: getOwnPresence
      summary: Fetch your own presence.
      description: Requires a user identity (no named permission).
      responses:
        "200":
          description: Your presence.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OwnPresence" }
