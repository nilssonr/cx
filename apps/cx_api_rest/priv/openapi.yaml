              schema: { $ref: "#/components/schemas/QualificationCode" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Validation" }

  /api/v1/qualification-codes/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
      - $ref: "#/components/parameters/TenantOverride"
    get:
      tags: [Qualification Codes]
      operationId: getQualificationCode
      summary: Fetch a qualification code.
      description: Any authenticated tenant member.
      responses:
        "200":
          description: The qualification code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QualificationCode" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Qualification Codes]
      operationId: updateQualificationCode
      summary: Update a qualification code.
      security:
        - bearerAuth: [qualification_codes:write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QualificationCodeUpdate" }
      responses:
        "200":
          description: The updated qualification code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QualificationCode" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }
    delete:
      tags: [Qualification Codes]
      operationId: deleteQualificationCode
      summary: Delete a qualification code.
      description: Fails if it has children.
      security:
        - bearerAuth: [qualification_codes:write]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/agent/session:
    post:
      tags: [Agent]
      operationId: startAgentSession
      summary: Idempotent sign-in.
      description: Requires a user identity in the token.
      security:
        - bearerAuth: [agent:session:self]
      responses:
        "200":
          description: The live session state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentSession" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    get:
      tags: [Agent]
      operationId: getAgentSession
      summary: Fetch the live session state.
      security:
        - bearerAuth: [agent:session:self]
      responses:
        "200":
          description: The live session state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentSession" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Agent]
      operationId: stopAgentSession
      summary: Idempotent sign-out.
      security:
        - bearerAuth: [agent:session:self]
