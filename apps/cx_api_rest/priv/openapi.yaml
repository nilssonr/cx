openapi: 3.1.1
info:
  title: cx REST API
  version: "0.1.0"
  description: |
    HTTP API for the cx multi-tenant contact center.

    Authentication is a Bearer JWT (OIDC / JWKS) on every endpoint except
    `GET /healthz`. Errors use RFC 9457 Problem Details
    (`application/problem+json`); the `type` is a stable `urn:cx:error:<name>`
    URN and field-validation failures carry an `errors` array.

    The caller's tenant comes from the token. Admin endpoints act on that
    tenant by default; a platform admin (holding `tenants:admin`) targets a
    different tenant with the `X-Tenant-Id` header.

    Each operation's required permission is its security requirement: the value
    listed under `bearerAuth` is the permission (a role name) the caller's roles
    must include. Per OpenAPI 3.1.1 these are role names "required for the
    execution, but not otherwise defined or exchanged in-band" — they are
    enforced server-side and are not scopes carried in the token. An empty
    `bearerAuth: []` means any authenticated caller.

    The realtime push channel `GET /api/v1/socket` is a WebSocket that
    authenticates in-band on its first frame; it is not expressible in
    OpenAPI and is intentionally omitted here.

servers:
  - url: /
    description: Same origin as the docs page.

security:
  - bearerAuth: []

tags:
  - name: Users
    description: Tenant users and their roles, skills, and routing profile.
  - name: Roles
    description: Permission bundles assignable to users.
  - name: Skills
    description: Skills and their proficiency levels.
  - name: Queues
    description: Queues, skill requirements, and wrap-up policy.
  - name: Routing Profiles
    description: Concurrency limits and media-mix guards for agents.
  - name: Not-Ready Reasons
    description: Reasons an agent can select when going not-ready.
  - name: Qualification Codes
    description: Disposition codes applied to interactions.
  - name: Tenants
    description: Platform-level tenant administration.
  - name: Agent
    description: Agent session, readiness, offers, and owned interactions.
  - name: Interactions
    description: Integrator surface for creating and inspecting interactions.
  - name: Presence
    description: Collaboration presence (separate from router readiness).
  - name: System
    description: Health and infrastructure.

paths:
  /healthz:
    get:
      tags: [System]
      operationId: health
      summary: Liveness probe (unauthenticated).
      security: []
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok
                required: [status]

  /api/v1/tenants:
    post:
      tags: [Tenants]
      operationId: createTenant
      summary: Create a tenant.
      security:
        - bearerAuth: [tenants:admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantCreate" }
      responses:
        "200":
          description: The created tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }
    get:
      tags: [Tenants]
      operationId: listTenants
      summary: List all tenants.
      security:
        - bearerAuth: [tenants:admin]
      responses:
        "200":
          description: All tenants.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/tenants/{tenant_id}:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    get:
      tags: [Tenants]
      operationId: getTenant
      summary: Fetch a tenant.
      description: Reading your own tenant needs no permission; another requires `tenants:admin`.
      responses:
        "200":
          description: The tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Tenants]
      operationId: updateTenant
      summary: Update a tenant.
      security:
        - bearerAuth: [tenants:admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantUpdate" }
      responses:
        "200":
          description: The updated tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }
    delete:
      tags: [Tenants]
      operationId: deleteTenant
      summary: Delete a tenant.
      security:
        - bearerAuth: [tenants:admin]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

